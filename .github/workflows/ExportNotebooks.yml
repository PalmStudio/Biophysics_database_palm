name: Export Pluto notebooks & Deploy
permissions:
  contents: write
on:
  push:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: export
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install unzip-http
        run: python -m pip install --upgrade pip unzip-http

      - name: Download missing file
        run: unzip-http -f
          https://zenodo.org/records/12704284/files/biophysics_database_palm.zip
          00-data/lidar/lidar.tar.bz2

      - name: 🙌 Install Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: "~1.10.0-0"

      - name: ⏱ Cache notebook states
        uses: actions/cache@v4
        with:
          path: _cache
          key: ${{ runner.os }}-pluto_state_cache-v3-${{ hashFiles('**/Project.toml',
            '**/Manifest.toml') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-pluto_state_cache-v3-${{ hashFiles('**/Project.toml', '**/Manifest.toml') }}

      - name: ⏱ Cache .julia
        uses: actions/cache@v4
        with:
          path: ~/.julia
          key: ${{ runner.os }}-dotjulia-v1-${{ hashFiles('**/Project.toml',
            '**/Manifest.toml') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-dotjulia-v1-${{ hashFiles('**/Project.toml', '**/Manifest.toml') }}

      - name: 🪴 Generate site
        run: julia --project=website/PlutoPages/pluto-deployment-environment -e ' import
          Pkg; Pkg.instantiate();

          include("./website/PlutoPages/generate.jl")'

      - name: 📰 Upload site generation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          path: generation_report.html

      - name: 🚀 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@releases/v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages
          FOLDER: ./website/PlutoPages/_site
